services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-backend
    env_file:
      - ./backend/.env
    environment:
      AURA_DATA_DIR: /app/backend/data
      PORT: 8000
      AURA_ENABLE_ANP_WORKER: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8000
    container_name: aura-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
