previews:
  generation: manual
  expireAfterDays: 7

services:
  - type: web
    name: aura-fullstack
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /api/protocols/status
    maxShutdownDelaySeconds: 120
    disk:
      name: aura-runtime-data
      mountPath: /app/backend/data
      sizeGB: 10
    envVars:
      - key: PORT
        value: "10000"
      - key: BACKEND_PORT
        value: "8000"
      - key: AURA_DATA_DIR
        value: /app/backend/data
      - key: AURA_ENABLE_ANP_WORKER
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_MODEL_CHAIN
        value: gemini-2.5-flash,gemini-1.5-pro
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_CLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_DEFAULT_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_CLAUDE_PERSONA_API_KEY
        sync: false
      - key: GROQ_FREE_MODELS_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    buildFilter:
      paths:
        - Dockerfile
        - docker/**
        - backend/**
        - frontend/**
      ignoredPaths:
        - backend/.env
        - backend/__pycache__/**
        - backend/chroma_db/**
        - backend/aura_network.db
        - frontend/node_modules/**
        - frontend/dist/**
