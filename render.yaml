services:
  - type: web
    name: aura-backend
    env: python
    buildCommand: "apt-get update && apt-get install -y build-essential python3-dev && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
