<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura GitHub Login</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0b0f17;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .login-panel {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 24px;
        background: #111827;
      }

      .github-login {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: #f8fafc;
        color: #111827;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 700;
        cursor: pointer;
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        color: #93c5fd;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="login-panel">
      <h1>Aura</h1>
      <button class="github-login" type="button" onclick="loginWithGitHub()">
        <span aria-hidden="true">GitHub</span>
        Login with GitHub
      </button>
      <div id="status" class="status"></div>
    </main>

    <script>
      const GITHUB_CLIENT_ID = "Ov23liaN2AWMm6wNOubq";
      const GITHUB_REDIRECT_URI = "https://vercel.app";
      const GITHUB_STATE_KEY = "aura_github_oauth_state";

      function createOAuthState() {
        const bytes = new Uint8Array(24);
        window.crypto.getRandomValues(bytes);
        return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      function loginWithGitHub() {
        const state = createOAuthState();
        localStorage.setItem(GITHUB_STATE_KEY, state);

        const authUrl = new URL("https://github.com/login/oauth/authorize");
        authUrl.searchParams.set("client_id", GITHUB_CLIENT_ID);
        authUrl.searchParams.set("redirect_uri", GITHUB_REDIRECT_URI);
        authUrl.searchParams.set("scope", "user");
        authUrl.searchParams.set("state", state);

        window.location.href = authUrl.toString();
      }

      async function initializeGitHubLogin() {
        const status = document.getElementById("status");
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");

        if (!code) return;

        const expectedState = localStorage.getItem(GITHUB_STATE_KEY);
        localStorage.removeItem(GITHUB_STATE_KEY);
        if (!expectedState || state !== expectedState) {
          status.textContent = "GitHub login failed state validation.";
          return;
        }

        status.textContent = "Completing GitHub login...";

        const response = await fetch("/api/github-token", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, redirect_uri: GITHUB_REDIRECT_URI }),
        });

        const data = await response.json();
        if (!response.ok) {
          status.textContent = data.message || "GitHub login failed.";
          return;
        }

        localStorage.setItem("github_access_token", data.access_token);
        status.textContent = `Signed in as ${data.user.name || data.user.login}.`;
        window.history.replaceState({}, document.title, window.location.pathname);
      }

      initializeGitHubLogin().catch((error) => {
        document.getElementById("status").textContent = error.message || "GitHub login failed.";
      });
    </script>
  </body>
</html>
